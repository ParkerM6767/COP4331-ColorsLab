name: PHP Linter

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  phpcs:
    name: PHPCS Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Match this to your LAMP stack version
          extensions: mbstring, intl
          tools: phpcs

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCS
        # This assumes you have a phpcs.xml config or want to use PSR12
        # Replace 'src/' with your application's PHP directory (e.g., 'app/', 'public/')
        run: phpcs LAMPAPI/
