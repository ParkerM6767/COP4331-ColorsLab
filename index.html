<!DOCTYPE html>

<html lang="en"data-bs-theme="dark">
<head>
    <title>Color Lab - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/code.js"></script>
    <script src="js/md5.js"></script>
</head>
<body style="background-color: rgb(25,25,25);">
    <h1 class="text-center p-5">COP4331 - LAMP Stack Colors</h1> 

    <div id="loginResult"></div>

    <div class="card text-center shadow-lg bg-body-tertiary" style="width: 40em; margin: auto;">
        <div class="card-header">
            <h4 class="text-left">Sign in to view colors</h4>
        </div>
        <form id="login">
            <div class="mb-3 p-2">
                <label for="username" class="fs-5 form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="mb-3 p-2">
                <label for="password" class="fs-5 form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="button" class=" btn btn-primary" onclick="doLogin()">Login</button>
            <div id="loginResult" class="mt-3"></div>
        </form>
    </div>

    <footer class="text-center p-3">
        <p>&copy; 2026 Stephen Meikle &#8212; COP4331</p>
    </footer>
</body>

</html>
