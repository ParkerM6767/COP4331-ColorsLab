<!DOCTYPE html>

<html lang="en" data-bs-theme="dark">

<head>
    <title>Color Lab - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/code.js"></script>
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function () {
            readCookie();
        }, false);
    </script>
</head>

<body class="d-flex flex-column min-vh-100" style="background-color: rgb(25,25,25);">

    <main class="flex-fill">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#" id="userWelcome">Hello, ${USERNAME}!</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item me-2">
                            <button class="btn btn-danger" aria-current="page" onclick="doLogout()">Logout</button>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>

        <div class="p-5" style="width: 30em">
            <h4>Search Colors</h4>
            <hr>
            <form class="d-flex" role="search">
                <input class="form-control me-2" id="searchText" type="search" placeholder="Search"
                    aria-label="Search" />
                <button class="btn btn-primary" type="button" onclick="searchColor()">Search Colors</button>
            </form>
            <hr>

            <h4>Add New Color</h4>
            <hr>
            <form class="d-flex" role="search">
                <input class="form-control me-2" id="colorText" placeholder="Color Name" aria-label="Color Nmae" />
                <button class="btn btn-success" type="button" onclick="addColor()">Add Color</button>
            </form>
            <hr>

            <div id="alertContainer">

            </div>
        </div>



        <table class="table">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Color Name</th>
                </tr>
            </thead>
            <tbody id="colorRowsTable">
                
            </tbody>
        </table>



    </main>

    <footer class="text-center p-3 footer">
        <hr>
        <p>&copy; 2026 Stephen Meikle &#8212; COP4331</p>
    </footer>
</body>

</html>
